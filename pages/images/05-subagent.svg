<svg xmlns="http://www.w3.org/2000/svg" width="700" height="440" viewBox="0 0 700 440" font-family="'Segoe UI', 'Noto Sans KR', sans-serif">
  <!-- Left: Main conversation (default) -->
  <rect x="15" y="40" width="310" height="380" rx="12" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/>
  <text x="170" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#065f46">기본 동작 (메인 대화)</text>

  <!-- Chat bubbles -->
  <rect x="35" y="70" width="200" height="35" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="45" y="93" font-size="12" fill="#065f46">사용자: /my-skill</text>

  <rect x="55" y="120" width="250" height="35" rx="12" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <text x="65" y="143" font-size="12" fill="#4338ca">Claude: [Skill 실행 중...]</text>

  <rect x="55" y="170" width="250" height="35" rx="12" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <text x="65" y="193" font-size="12" fill="#4338ca">Claude: 결과입니다.</text>

  <rect x="35" y="230" width="270" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="170" y="252" text-anchor="middle" font-size="12" fill="#92400e">모든 것이 메인 대화에서</text>
  <text x="170" y="270" text-anchor="middle" font-size="12" fill="#92400e">이루어짐</text>

  <!-- VS divider -->
  <text x="350" y="230" text-anchor="middle" font-size="20" font-weight="bold" fill="#9ca3af">vs</text>

  <!-- Right: Subagent -->
  <rect x="375" y="40" width="310" height="380" rx="12" fill="#faf5ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="530" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#7c3aed">context: fork (Subagent)</text>

  <!-- Chat bubbles -->
  <rect x="395" y="70" width="230" height="35" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="405" y="93" font-size="12" fill="#065f46">사용자: /deep-research 질문</text>

  <rect x="415" y="120" width="250" height="35" rx="12" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <text x="425" y="143" font-size="12" fill="#4338ca">Claude: subagent 실행...</text>

  <!-- Subagent box -->
  <rect x="405" y="175" width="260" height="130" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="535" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="#7c3aed">Subagent (별도 환경)</text>
  <text x="535" y="225" text-anchor="middle" font-size="11" fill="#6b7280">독립적으로 작업 수행</text>
  <text x="535" y="245" text-anchor="middle" font-size="11" fill="#6b7280">파일 탐색, 분석, 정리...</text>
  <text x="535" y="265" text-anchor="middle" font-size="11" fill="#6b7280">결과를 메인 대화에 반환</text>

  <!-- Arrow from subagent back -->
  <path d="M535,305 L535,325" stroke="#8b5cf6" stroke-width="2" fill="none" marker-end="url(#arrowSub)"/>

  <defs>
    <marker id="arrowSub" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
  </defs>

  <rect x="415" y="330" width="250" height="35" rx="12" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <text x="425" y="353" font-size="12" fill="#4338ca">Claude: 결과를 정리하면...</text>

  <!-- Benefits -->
  <rect x="15" y="310" width="310" height="100" rx="8" fill="#f0fdf4"/>
  <text x="35" y="335" font-size="12" font-weight="bold" fill="#065f46">장점:</text>
  <text x="35" y="357" font-size="11" fill="#4b5563">• 메인 컨텍스트를 오염시키지 않음</text>
  <text x="35" y="377" font-size="11" fill="#4b5563">• 복잡한 작업을 독립적으로 수행</text>
  <text x="35" y="397" font-size="11" fill="#4b5563">• 실패해도 메인 대화에 영향 없음</text>
</svg>
