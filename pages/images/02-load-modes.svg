<svg xmlns="http://www.w3.org/2000/svg" width="750" height="340" viewBox="0 0 750 340" font-family="'Segoe UI', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
    <marker id="arrow-g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrow-b" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- User Input -->
  <rect x="20" y="120" width="130" height="80" rx="40" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/>
  <text x="85" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#065f46">사용자</text>
  <text x="85" y="175" text-anchor="middle" font-size="12" fill="#065f46">입력</text>

  <!-- Branch lines -->
  <line x1="150" y1="140" x2="230" y2="80" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-g)"/>
  <line x1="150" y1="180" x2="230" y2="240" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-b)"/>

  <!-- Method 1: Manual -->
  <rect x="240" y="35" width="220" height="90" rx="10" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/>
  <text x="260" y="60" font-size="12" font-weight="bold" fill="#10b981">방법 1: 수동 호출</text>
  <text x="260" y="82" font-size="11" fill="#4b5563">사용자가 "/skill-name" 또는</text>
  <text x="260" y="100" font-size="11" fill="#4b5563">"/skill-name 인수"로 직접 호출</text>

  <!-- Method 2: Auto -->
  <rect x="240" y="195" width="220" height="105" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="260" y="220" font-size="12" font-weight="bold" fill="#3b82f6">방법 2: 자동 로드</text>
  <text x="260" y="242" font-size="11" fill="#4b5563">Claude가 요청을 분석하고</text>
  <text x="260" y="260" font-size="11" fill="#4b5563">description을 참고하여</text>
  <text x="260" y="278" font-size="11" fill="#4b5563">적절한 Skill을 자동 선택</text>

  <!-- Merge arrows -->
  <line x1="460" y1="80" x2="530" y2="140" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-g)"/>
  <line x1="460" y1="248" x2="530" y2="180" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-b)"/>

  <!-- SKILL.md Load -->
  <rect x="540" y="120" width="190" height="80" rx="10" fill="#faf5ff" stroke="#8b5cf6" stroke-width="2.5"/>
  <text x="635" y="152" text-anchor="middle" font-size="13" font-weight="bold" fill="#7c3aed">SKILL.md 로드</text>
  <text x="635" y="175" text-anchor="middle" font-size="11" fill="#6b7280">frontmatter 해석 →</text>
  <text x="635" y="192" text-anchor="middle" font-size="11" fill="#6b7280">마크다운 지침 실행</text>
</svg>
